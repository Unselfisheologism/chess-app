name: Build App

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Gradle Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', 'scripts/patch-flutter-sdk.sh') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Get the source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Patch Flutter SDK for AGP 8.x OutputFile compat
        run: bash scripts/patch-flutter-sdk.sh

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Fix gradlew permissions and line endings
        run: |
          chmod +x ./android/gradlew
          dos2unix ./android/gradlew || true

      - name: Setup signing
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          cat > keystore.properties << EOF
          storeFile=keystore.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Clean and Generate Release APK
        env:
          ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4096m
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          cd android
          ./gradlew --stop-gradle-daemon || true
          ./gradlew clean
          ./gradlew assembleRelease -x test --warning-mode=all --stacktrace

      - name: Upload Release APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Clean and Generate Debug APK
        env:
          ORG_GRADLE_PROJECT_org_gradle_jvmargs: -Xmx4096m
          GRADLE_OPTS: -Dorg.gradle.daemon=false
        run: |
          cd android
          ./gradlew --stop-gradle-daemon || true
          ./gradlew clean
          ./gradlew assembleDebug -x test --warning-mode=all --stacktrace

      - name: Upload Debug APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Cleanup Secrets
        if: always()
        run: |
          rm -f keystore.jks
          rm -f keystore.properties