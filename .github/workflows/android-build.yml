name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android (APK & AAB)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable

      - name: Setup Java (Temurin 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'scripts/patch-flutter-sdk.sh') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Patch Flutter SDK for AGP 8.x OutputFile compat
        run: bash scripts/patch-flutter-sdk.sh

      - name: Get Dependencies
        run: flutter pub get

      - name: Inject Bytez API key + build SHA as Flutter dart-defines
        env:
          BYTEZ_API_KEY: ${{ secrets.BYTEZ_API_KEY }}
          BUILD_SHA: ${{ github.sha }}
        run: python3 scripts/inject-bytez-dart-defines.py android/gradle.properties

      - name: Setup Signing Keys
        working-directory: android
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Using configured signing secrets"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > app/keystore.jks
            cat > keystore.properties << EOF
          storeFile=keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
          else
            echo "No signing secrets configured; generating debug keystore at ~/.android/debug.keystore"
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -alias androiddebugkey -storepass android -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" 2>&1 | tail -3
            # Leave keystore.properties absent so build.gradle's else-branch
            # picks up the debug keystore at the expected path.
            rm -f keystore.properties
          fi

      - name: Make Gradlew Executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Release AAB
        working-directory: android
        run: ./gradlew bundleRelease --no-daemon

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.sha }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 14

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab-${{ github.sha }}
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 14

      - name: Cleanup Secrets
        if: always()
        working-directory: android
        run: |
          rm -f app/keystore.jks
          rm -f keystore.properties