name: Build release artifacts

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties', 'scripts/patch-flutter-sdk.sh') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Patch Flutter SDK for AGP 8.x OutputFile compat
        run: bash scripts/patch-flutter-sdk.sh

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Inject Bytez API key + build SHA as Flutter dart-defines
        env:
          BYTEZ_API_KEY: ${{ secrets.BYTEZ_API_KEY }}
          BUILD_SHA: ${{ github.sha }}
        run: python3 scripts/inject-bytez-dart-defines.py android/gradle.properties

      - name: Verify dart-defines landed in gradle.properties
        run: |
          set -e
          LINE=$(grep '^dart-defines=' android/gradle.properties)
          if [ -z "$LINE" ]; then
            echo "::error::dart-defines is NOT in android/gradle.properties"
            exit 1
          fi
          echo "  -> $LINE"
          FINGERPRINT=$(echo "$LINE" | tr ',' '\n' | head -1 | awk -F= '{print $3}' | sha256sum | cut -c1-12)
          echo "  -> BYTEZ_API_KEY sha256_12=$FINGERPRINT"

      - name: Decode Android keystore
        working-directory: android
        env:
          SIGNING_KEY_STORE_BASE64: ${{ secrets.SIGNING_KEY_STORE_BASE64 }}
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          echo "$SIGNING_KEY_STORE_BASE64" | base64 --decode > app/keystore.jks
          cat > keystore.properties << EOF
          storeFile=app/keystore.jks
          storePassword=$SIGNING_STORE_PASSWORD
          keyAlias=$SIGNING_KEY_ALIAS
          keyPassword=$SIGNING_KEY_PASSWORD
          EOF

      - name: Build Android release AAB
        working-directory: ./android
        run: ./gradlew bundleRelease

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 14

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: stable
          cache: true

      - name: Setup Ruby and CocoaPods
        run: |
          gem install cocoapods -N
          cd ios && pod install

      - name: Decode iOS signing assets
        env:
          CERTIFICATES_BASE64: ${{ secrets.CERTIFICATES_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          echo "$CERTIFICATES_BASE64" | base64 --decode > /tmp/certificate.p12
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > /tmp/profile.mobileprovision

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -t 3600 -u build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build iOS IPA
        working-directory: ./ios
        env:
          BYTEZ_API_KEY: ${{ secrets.BYTEZ_API_KEY }}
          BUILD_SHA: ${{ github.sha }}
        run: |
          flutter build ipa \
            --export-options-plist=ExportOptions.plist \
            --dart-define=BYTEZ_API_KEY="${BYTEZ_API_KEY}" \
            --dart-define=BUILD_SHA="${BUILD_SHA}"

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release.ipa
          path: build/ios/ipa/*.ipa
          retention-days: 14
