name: chess_do_it
description: Learn chess, unlock your phone. Daily micro-lessons with social media lock.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Pinned to 2.2.x — 2.3.0+ requires Dart 3.5+, but project is on Dart 3.4 (Flutter 3.22).
  shared_preferences: '>=2.2.0 <2.3.0'

  # State management
  provider: ^6.1.1

  # Chess engine — using stockfish_flutter_plus because the older stockfish_for_flutter
  # (0.1.2) declares SDK <3.0.0 and won't resolve on Dart 3.4.
  stockfish_flutter_plus: ^1.0.1

  # Animations — pinned to 2.7.0 (last 2.x release). Lottie 3.x requires Flutter 3.27+
  # because it adopted Color.toARGB32. Bump lottie to ^3.x once project upgrades Flutter.
  lottie: '>=2.7.0 <3.0.0'

  # Subscriptions (RevenueCat) — SDK 3.4.0+ matches our Dart 3.4.
  purchases_flutter: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/lottie/
    - assets/lessons/
    - assets/puzzles/
